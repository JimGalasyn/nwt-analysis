name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Test
        # Bit-rot guard: every reproduction module compiles and is discoverable.
        # The [engine] extra (git upstreams) is intentionally NOT installed here —
        # core-only install must stay green.
        run: pytest -v
