name: Publish to PyPI

# Trusted publishing (OIDC) — no API token stored. Triggers on a published GitHub
# Release. Version is static (pyproject), so the built artifact's version comes
# from the release commit; make sure it matches the tag.
#
# One-time PyPI setup before the FIRST publish (project not on PyPI yet — use a
# *pending* publisher): pypi.org -> Account -> Publishing -> Add a pending publisher:
#     PyPI Project Name: nwt-analysis
#     Owner:             JimGalasyn
#     Repository name:   nwt-analysis
#     Workflow name:     publish-pypi.yml
#     Environment name:  pypi
# Also create a GitHub Environment named `pypi`.
#
# nwt-substrate and jax-solitons should be on PyPI first so the [engine] extra
# resolves (the core install does not need them).

on:
  release:
    types: [published]
  workflow_dispatch:   # publish an already-tagged version manually (--ref vX.Y.Z)

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
